<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a city...</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Auckland</option>
      </select>
      <div class="city">
        <div>
          <h2>Los Angeles</h2>
          <div class="date">August 15th 2026</div>
        </div>
        <div class="time">01:49:34 <small>AM</small></div>
      </div>
      <div class="city">
        <div>
          <h2>Paris</h2>
          <div class="date">August 15th 2026</div>
        </div>
        <div class="time">01:49:34 <small>AM</small></div>
      </div>
    </div>
    <footer>
      This project was coded by <strong>Menna Bevan</strong> and is open sourced
      on
      <a href="https://github.com/mennabevan/WorldClocks" target="_blank"
        >GitHub</a
      >
    </footer>
    <script src="src/javascript.js"></script>
  </body>
</html>
